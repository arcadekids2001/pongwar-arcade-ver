<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PongWar is an arcade-style game that remixes gameplay mechanics inspired by Pong and Spacewar!. Face off against an almost unbeatable AI, shoot bullets, and try to turn the tide."
    />
    <title>PongWAR! Arcade Ver.2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!--
      PongWar is an arcade-style game that remixes gameplay mechanics inspired by two early classic games: Pong and Spacewar!.
      Players must face off in a Pong match against an almost unbeatable AI. Fortunately, players can shoot bullets to attack the AI and turn the tide in their favor.
      It's a joke in the age of AI.
      Use your mouse to move and spacebar to shoot. Try to defeat the AI!
    -->
    <div id="app">
      <main v-if="!gameStart" class="start-screen">
        <h1 class="title-blink">{{ title }}</h1>
        <button @click="startGame" class="blink-button" type="button">Start Game</button>
        <p class="control-tip">Try to beat the AI.</p>
        <p class="control-tip">Mouse: Move</p>
        <p class="control-tip">Space: Shoot</p>
      </main>

      <main
        v-else
        ref="gameContainer"
        class="game-container"
        @mousemove="handleMouseMove"
      >
        <section class="crt-frame" aria-label="PongWAR arcade screen">
          <div class="crt-screen">
            <div class="noise-overlay" aria-hidden="true"></div>
            <div :class="['canvas-wrapper', { danger: playerHealth <= 2 && !gameOver }]">
              <canvas ref="gameCanvas" width="640" height="480"></canvas>
            </div>
          </div>
        </section>

        <div :class="['scoreboard', { danger: playerHealth === 2 }]">
          <span>Player Health: {{ playerHealth }} / 5</span>
          <span>AI Health: {{ aiHealth }} / 10</span>
        </div>

        <section v-if="gameOver" class="game-over" aria-live="polite">
          <h2>{{ gameOverText }}</h2>
          <button @click="restartGame" type="button">Restart</button>
        </section>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.2.37/vue.global.prod.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
